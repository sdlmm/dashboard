<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:#f5f4f0;color:#1a1a18;min-height:100vh}
header{background:#fff;border-bottom:1px solid #e0dfd7;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}

header p{font-size:12px;color:#888780}
.main{max-width:1000px;margin:0 auto;padding:20px 20px}
.pref-bar{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.pref-btn{padding:7px 18px;font-size:13px;border:1.5px solid #d3d1c7;border-radius:20px;cursor:pointer;background:#fff;color:#5f5e5a;font-weight:500;transition:all .15s}
.pref-btn:hover{background:#f1efe8}
.pref-btn.active-tokyo{background:#185FA5;color:#fff;border-color:#185FA5}
.pref-btn.active-saitama{background:#C94040;color:#fff;border-color:#C94040}
.pref-btn.active-chiba{background:#2A7A3B;color:#fff;border-color:#2A7A3B}
.pref-btn.active-kanagawa{background:#7A3B8A;color:#fff;border-color:#7A3B8A}
.pref-label{font-size:12px;color:#888780;margin-right:4px}
.controls{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;align-items:center}
.ctrl-group{display:flex;align-items:center;gap:6px;font-size:13px;color:#5f5e5a}
select{font-size:13px;padding:6px 10px;border:1px solid #d3d1c7;border-radius:8px;background:#fff;color:#1a1a18;cursor:pointer;outline:none}
.year-selector{display:flex;gap:4px;flex-wrap:wrap}
.year-btn{padding:5px 11px;font-size:12px;border:1px solid #d3d1c7;border-radius:6px;cursor:pointer;background:#fff;color:#5f5e5a;transition:all .15s;white-space:nowrap}
.year-btn:hover{background:#f1efe8}
.year-btn.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.tab-bar{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.tab{padding:7px 16px;font-size:13px;border:1px solid #d3d1c7;border-radius:8px;cursor:pointer;background:#fff;color:#5f5e5a;transition:all .15s}
.tab:hover{background:#f1efe8}
.tab.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}}
.metric{background:#fff;border:1px solid #e0dfd7;border-radius:8px;padding:12px 14px}
.metric-category{font-size:10px;color:#b4b2a9;margin-bottom:3px}
.metric-label{font-size:11px;color:#888780;margin-bottom:2px;line-height:1.4}
.metric-value{font-size:20px;font-weight:500}
.metric-sub{font-size:11px;margin-top:3px}
.up{color:#0f6e56}.down{color:#993c1d}.neutral{color:#888780}
.chart-card{background:#fff;border:1px solid #e0dfd7;border-radius:12px;padding:16px 20px;margin-bottom:14px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px}
.chart-title{font-size:13px;font-weight:500;color:#5f5e5a}
.chart-wrap{position:relative;width:100%}
.legend{display:flex;flex-wrap:wrap;gap:14px;font-size:11px;color:#5f5e5a;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:7px 10px;color:#5f5e5a;border-bottom:1px solid #e0dfd7;font-weight:500;white-space:nowrap;background:#f9f8f5}
th.num{text-align:right}
td{padding:6px 10px;border-bottom:1px solid #f1efe8}
tr:hover td{background:#faf9f6}
td.num{text-align:right}
td.hl,th.hl{background:#ddeaf7;color:#185fa5}
.badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:500}
.badge-up{background:#e1f5ee;color:#0f6e56}
.badge-down{background:#faece7;color:#993c1d}
.badge-flat{background:#f1efe8;color:#5f5e5a}
.tab-content{display:none}
.tab-content.active{display:block}
.note{font-size:11px;color:#888780;margin-top:10px;line-height:1.6}
.change-ctrl{display:flex;align-items:center;gap:6px;font-size:12px;color:#5f5e5a;flex-wrap:wrap}
.change-ctrl select{font-size:12px;padding:4px 8px}
.divider{border:none;border-top:1px solid #e0dfd7;margin:8px 0}
.pref-note{font-size:11px;color:#888780;background:#f9f8f5;border:1px solid #e0dfd7;border-radius:6px;padding:6px 10px;margin-bottom:14px}

<body>
<header>
  <h1>首都圏 公立小中学校 教育人口推計ダッシュボード</h1>
  <p>一都三県 R7（2025年）実数 ＋ R8〜R12（2026〜2030年）推計</p>
</header>
<div class="main">

  <!-- 都県切替 -->
  <div class="pref-bar">
    <span class="pref-label">都県：</span>
    <button class="pref-btn active-tokyo" data-pref="tokyo">東京都</button>
    <button class="pref-btn" data-pref="saitama">埼玉県</button>
    <button class="pref-btn" data-pref="chiba">千葉県</button>
    <button class="pref-btn" data-pref="kanagawa">神奈川県</button>
  </div>

  <div id="prefNote" class="pref-note" style="display:none"></div>

  <div class="controls">
    <div class="ctrl-group">表示：
      <select id="schoolType">
        <option value="es">公立小学校</option>
        <option value="jh">公立中学校</option>
        <option value="both">小学校＋中学校（合計）</option>
      </select>
    </div>
    <div class="ctrl-group">地域：<select id="regionFilter"><option value="all">全地区</option></select></div>
    <div class="ctrl-group">ランキング件数：
      <select id="topN">
        <option value="10">上位10</option>
        <option value="20">上位20</option>
        <option value="all">全地区</option>
      </select>
    </div>
  </div>

  <div class="metrics" id="metricsArea"></div>

  <div class="tab-bar">
    <button class="tab active" data-tab="overview">全体推移</button>
    <button class="tab" data-tab="ranking">地区ランキング</button>
    <button class="tab" data-tab="change">増減率分析</button>
    <button class="tab" data-tab="table">データ一覧</button>
  </div>

  <div id="tab-overview" class="tab-content active">
    <div class="chart-card">
      <div class="chart-title" style="margin-bottom:12px" id="overviewTitle">推計人口推移</div>
      <div class="legend" id="legend-overview"></div>
      <div class="chart-wrap" style="height:280px"><canvas id="chartOverview"></canvas></div>
    </div>
  </div>

  <div id="tab-ranking" class="tab-content">
    <div class="chart-card">
      <div class="card-header">
        <div class="chart-title">地区別 人口ランキング</div>
        <div class="year-selector" id="yearSelectorRanking"></div>
      </div>
      <div class="chart-wrap" id="rankingChartWrap"><canvas id="chartRanking"></canvas></div>
    </div>
  </div>

  <div id="tab-change" class="tab-content">
    <div class="chart-card">
      <div class="card-header">
        <div class="chart-title">地区別 増減率（%）　緑＝増加 / 橙＝減少</div>
        <div class="change-ctrl">
          基準：<select id="baseYearChange"></select>→比較：<select id="compYearChange"></select>
        </div>
      </div>
      <div class="chart-wrap" id="changeChartWrap"><canvas id="chartChange"></canvas></div>
    </div>
  </div>

  <div id="tab-table" class="tab-content">
    <div class="chart-card">
      <div class="card-header">
        <div class="chart-title">地区別 年度別推計データ一覧</div>
        <div class="year-selector" id="yearSelectorTable"></div>
      </div>
      <div class="table-wrap"><table id="dataTable"></table></div>
      <p class="note" id="tableNote"></p>
    </div>
  </div>
</div>

// ========== 状態管理 ==========
let currentPref = 'tokyo';
let selYearRanking = 0;
let selYearTable = 0;
let charts = {};

function P() { return PREFS[currentPref]; }

function getYears() { return P().years; }

function getTotalKey() { return currentPref === 'tokyo' ? '全都' : '県計'; }

function getData(type) {
  const p = P();
  if(type==='es') return p.es;
  if(type==='jh') return p.jh;
  const combined = {};
  for(const k of Object.keys(p.es)) {
    if(p.jh[k]) combined[k] = p.es[k].map((v,i)=>v+p.jh[k][i]);
  }
  return combined;
}

function getRegionOptions() { return P().regions; }

function getDistrictData(type, region) {
  const data = getData(type);
  const p = P();
  const excludeKeys = [getTotalKey(), '区部', '市町村部'];
  let keys = Object.keys(data).filter(k=>!excludeKeys.includes(k));
  if(region==='ku') keys = keys.filter(k=>p.kuList.includes(k));
  if(region==='shi') keys = keys.filter(k=>p.shiList.includes(k));
  return {keys, data};
}

function pct(a,b){ return ((b-a)/a*100).toFixed(1); }
function fmt(n){ return Math.round(n).toLocaleString('ja-JP'); }

// ========== UI 初期化 ==========

function initPrefUI() {
  const p = P();
  // pref note
  const noteEl = document.getElementById('prefNote');
  if(p.note){ noteEl.style.display=''; noteEl.innerHTML=p.note; }
  else { noteEl.style.display='none'; noteEl.innerHTML=''; }

  // region selector
  const regionSel = document.getElementById('regionFilter');
  regionSel.innerHTML = Object.entries(p.regions).map(([v,l])=>`<option value="${v}">${l}</option>`).join('');

  // year selectors
  buildYearSelector('yearSelectorRanking', 0, idx=>{ selYearRanking=idx; renderRanking(); });
  buildYearSelector('yearSelectorTable', 0, idx=>{ selYearTable=idx; renderTable(); });

  // change year selectors
  const baseEl = document.getElementById('baseYearChange');
  const compEl = document.getElementById('compYearChange');
  const yrs = getYears();
  baseEl.innerHTML = yrs.slice(0,-1).map((y,i)=>`<option value="${i}">${y}</option>`).join('');
  compEl.innerHTML = yrs.slice(1).map((y,i)=>`<option value="${i+1}"${i===yrs.length-2?' selected':''}>${y}</option>`).join('');

  // title
  document.getElementById('overviewTitle').textContent = `${p.name}　推計人口推移（${yrs[0]}〜${yrs[yrs.length-1]}）`;
  document.getElementById('tableNote').textContent = `※ハイライト列が選択中の年度　／　増減率は${p.baseLabel}→${p.compLabel}比較　／　出典：${p.source}`;

  selYearRanking = 0;
  selYearTable = 0;
}

function buildYearSelector(id, sel, cb){
  const el = document.getElementById(id);
  const yrs = getYears();
  el.innerHTML = yrs.map((y,i)=>`<button class="year-btn${i===sel?' active':''}" data-i="${i}">${y}</button>`).join('');
  el.querySelectorAll('.year-btn').forEach(b=>b.addEventListener('click',()=>{
    el.querySelectorAll('.year-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    cb(+b.dataset.i);
  }));
}

// ========== メトリクス ==========

function updateMetrics(){
  const type = document.getElementById('schoolType').value;
  const region = document.getElementById('regionFilter').value;
  const p = P();
  const data = getData(type);
  const tk = getTotalKey();
  const yrs = getYears();
  let r0, rN;
  if(region==='all'){
    r0 = data[tk][0]; rN = data[tk][yrs.length-1];
  } else {
    const {keys,data:d}=getDistrictData(type,region);
    r0=keys.reduce((s,k)=>s+d[k][0],0);
    rN=keys.reduce((s,k)=>s+d[k][yrs.length-1],0);
  }
  const pc = pct(r0,rN), pcn = parseFloat(pc);
  const diff = rN-r0, diffStr=(diff>0?'+':'')+fmt(diff);
  const typeLabel = type==='es'?'公立小学校':type==='jh'?'公立中学校':'小学校＋中学校';
  const regionLabel = currentPref==='tokyo'
    ? (region==='ku'?'区部':region==='shi'?'市部':p.name)
    : (region==='ku'?'市':region==='shi'?'町村':p.name);

  let cards='';
  if(region==='all'){
    const esTotal0=p.es[tk][0], jhTotal0=p.jh[tk][0];
    cards=`
      <div class="metric"><div class="metric-category">${typeLabel}｜${regionLabel}</div><div class="metric-label">${yrs[0]}現況</div><div class="metric-value">${fmt(r0)}</div><div class="metric-sub neutral">人</div></div>
      <div class="metric"><div class="metric-category">${typeLabel}｜${regionLabel}</div><div class="metric-label">${yrs[yrs.length-1]}推計</div><div class="metric-value">${fmt(rN)}</div><div class="metric-sub ${pcn<0?'down':'up'}">${diffStr}人（${pc}%）</div></div>
      <div class="metric"><div class="metric-category">公立小学校｜${regionLabel}</div><div class="metric-label">${yrs[0]}現況</div><div class="metric-value">${fmt(esTotal0)}</div><div class="metric-sub neutral">人</div></div>
      <div class="metric"><div class="metric-category">公立中学校｜${regionLabel}</div><div class="metric-label">${yrs[0]}現況</div><div class="metric-value">${fmt(jhTotal0)}</div><div class="metric-sub neutral">人</div></div>`;
  } else {
    const {keys,data:d}=getDistrictData(type,region);
    const maxK=keys.reduce((a,b)=>d[a][0]>d[b][0]?a:b);
    const minRateK=keys.reduce((a,b)=>parseFloat(pct(d[a][0],d[a][yrs.length-1]))<parseFloat(pct(d[b][0],d[b][yrs.length-1]))?a:b);
    const minRate=parseFloat(pct(d[minRateK][0],d[minRateK][yrs.length-1]));
    cards=`
      <div class="metric"><div class="metric-category">${typeLabel}｜${regionLabel}</div><div class="metric-label">${yrs[0]}現況合計</div><div class="metric-value">${fmt(r0)}</div><div class="metric-sub neutral">人</div></div>
      <div class="metric"><div class="metric-category">${typeLabel}｜${regionLabel}</div><div class="metric-label">${yrs[yrs.length-1]}推計合計</div><div class="metric-value">${fmt(rN)}</div><div class="metric-sub ${pcn<0?'down':'up'}">${diffStr}人（${pc}%）</div></div>
      <div class="metric"><div class="metric-category">${typeLabel}｜${regionLabel}｜${yrs[0]}最多</div><div class="metric-label">${maxK}</div><div class="metric-value">${fmt(d[maxK][0])}</div><div class="metric-sub neutral">人</div></div>
      <div class="metric"><div class="metric-category">${typeLabel}｜${regionLabel}｜最大減少</div><div class="metric-label">${minRateK}</div><div class="metric-value">${minRate}%</div><div class="metric-sub down">${yrs[0]}→${yrs[yrs.length-1]}</div></div>`;
  }
  document.getElementById('metricsArea').innerHTML=cards;
}

// ========== チャート ==========

function dc(id){ if(charts[id]){ charts[id].destroy(); delete charts[id]; } }

function renderOverview(){
  dc('chartOverview');
  const type = document.getElementById('schoolType').value;
  const data = getData(type);
  const p = P();
  const yrs = getYears();
  const tk = getTotalKey();
  const areaKeys = [tk, '区部', '市町村部'].filter(k=>data[k]);
  const colors = [p.color, p.color+'99', p.color+'55'];
  document.getElementById('legend-overview').innerHTML =
    areaKeys.map((l,i)=>`<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${l}</span>`).join('')
    + '<span class="legend-item" style="margin-left:12px;gap:5px"><span style="display:inline-block;width:16px;height:0;border-top:2.5px solid #888;vertical-align:middle"></span>実数</span>'
    + '<span class="legend-item" style="gap:5px"><span style="display:inline-block;width:16px;height:0;border-top:2.5px dashed #888;vertical-align:middle"></span>推計</span>';
  // 実数(index=0)は大きい点、推計(index>=1)はsegmentで破線
  const datasets = areaKeys.map((label,i)=>({
    label,
    data: data[label],
    borderColor: colors[i],
    backgroundColor: colors[i]+'12',
    borderWidth: 2,
    pointRadius: data[label].map((_,idx)=>idx===0?6:4),
    pointStyle: data[label].map((_,idx)=>idx===0?'circle':'circle'),
    tension: 0.3,
    fill: false,
    segment: {
      borderDash: ctx => ctx.p0DataIndex === 0 ? [] : [5,4]
    }
  }));
  charts['chartOverview'] = new Chart(document.getElementById('chartOverview'),{
    type:'line',
    data:{labels:yrs, datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.raw)}人`}}},
      scales:{y:{ticks:{callback:v=>fmt(v)},grid:{color:'rgba(0,0,0,0.06)'}},x:{grid:{display:false}}}}
  });
}

function renderRanking(){
  dc('chartRanking');
  const type = document.getElementById('schoolType').value;
  const region = document.getElementById('regionFilter').value;
  const topN = document.getElementById('topN').value;
  const p = P();
  const {keys,data}=getDistrictData(type,region);
  let sorted=keys.map(k=>({name:k,val:data[k][selYearRanking]})).sort((a,b)=>b.val-a.val);
  if(topN!=='all') sorted=sorted.slice(0,+topN);
  document.getElementById('rankingChartWrap').style.height=(sorted.length*36+80)+'px';
  charts['chartRanking']=new Chart(document.getElementById('chartRanking'),{
    type:'bar',
    data:{labels:sorted.map(d=>d.name),datasets:[{data:sorted.map(d=>d.val),backgroundColor:p.color+'cc',borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${fmt(ctx.raw)}人`}}},scales:{x:{ticks:{callback:v=>fmt(v)},grid:{color:'rgba(0,0,0,0.06)'}},y:{grid:{display:false},ticks:{font:{size:11}}}}}
  });
}

function renderChange(){
  dc('chartChange');
  const type = document.getElementById('schoolType').value;
  const region = document.getElementById('regionFilter').value;
  const topN = document.getElementById('topN').value;
  const bi = +document.getElementById('baseYearChange').value;
  const ci = +document.getElementById('compYearChange').value;
  const {keys,data}=getDistrictData(type,region);
  let sorted=keys.map(k=>({name:k,rate:parseFloat(pct(data[k][bi],data[k][ci]))})).sort((a,b)=>a.rate-b.rate);
  if(topN!=='all'){const n=+topN;sorted=[...sorted.slice(0,Math.ceil(n/2)),...sorted.slice(-Math.floor(n/2))];}
  document.getElementById('changeChartWrap').style.height=(sorted.length*36+80)+'px';
  charts['chartChange']=new Chart(document.getElementById('chartChange'),{
    type:'bar',
    data:{labels:sorted.map(d=>d.name),datasets:[{data:sorted.map(d=>d.rate),backgroundColor:sorted.map(d=>d.rate>=0?'#1D9E75cc':'#D85A30cc'),borderRadius:3}]},
    options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.raw.toFixed(1)}%`}}},scales:{x:{ticks:{callback:v=>v+'%'},grid:{color:'rgba(0,0,0,0.06)'}},y:{grid:{display:false},ticks:{font:{size:11}}}}}
  });
}

function renderTable(){
  const type = document.getElementById('schoolType').value;
  const region = document.getElementById('regionFilter').value;
  const {keys,data}=getDistrictData(type,region);
  const yrs = getYears();
  const lastIdx = yrs.length-1;
  const rows=keys.map(k=>{
    const rate=parseFloat(pct(data[k][0],data[k][lastIdx]));
    const badge=rate>0?`<span class="badge badge-up">+${rate}%</span>`:rate<-5?`<span class="badge badge-down">${rate}%</span>`:`<span class="badge badge-flat">${rate}%</span>`;
    return `<tr><td style="font-weight:500;white-space:nowrap">${k}</td>${data[k].map((v,i)=>`<td class="num${i===selYearTable?' hl':''}">${fmt(v)}</td>`).join('')}<td style="text-align:center">${badge}</td></tr>`;
  }).join('');
  document.getElementById('dataTable').innerHTML=`
    <thead><tr><th>地区名</th>${yrs.map((y,i)=>`<th class="num${i===selYearTable?' hl':''}">${y}</th>`).join('')}<th style="text-align:center">増減率</th></tr></thead>
    <tbody>${rows}</tbody>`;
}

// ========== アクティブタブ ==========

function activeTab(){ return document.querySelector('.tab.active').dataset.tab; }

function renderActiveTab(){
  const tab = activeTab();
  if(tab==='overview') renderOverview();
  if(tab==='ranking') renderRanking();
  if(tab==='change') renderChange();
  if(tab==='table') renderTable();
}

function fullRefresh(){
  initPrefUI();
  updateMetrics();
  renderActiveTab();
}

// ========== イベントリスナー ==========

// 都県切替
document.querySelectorAll('.pref-btn').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.pref-btn').forEach(b=>{
    b.className='pref-btn';
  });
  currentPref=btn.dataset.pref;
  btn.classList.add(`active-${currentPref}`);
  fullRefresh();
}));

// タブ切替
document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
  renderActiveTab();
}));

['schoolType','regionFilter','topN'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{ updateMetrics(); renderActiveTab(); });
});
['baseYearChange','compYearChange'].forEach(id=>{
  document.getElementById(id).addEventListener('change',()=>{ if(activeTab()==='change') renderChange(); });
});

// ========== 初期描画 ==========
fullRefresh();
</script>
